AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CreativeSpark Identity Hub - Asynchronous Biometric Verification App

Globals:
  Function:
    Timeout: 30
    Runtime: python3.13
    MemorySize: 128
  Api:
    Cors:
      AllowMethods: "'POST,GET,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'https://app.joesparkman.com'"

Resources:
  IdentityHubApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod

  UploadSubserviceFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: upload_subservice/
      Handler: app.lambda_handler
      Events:
        UploadImage:
          Type: Api
          Properties:
            Path: /upload
            Method: post
            RestApiId: !Ref IdentityHubApi

  VerifyWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: creativespark_verify_worker/
      Handler: app.lambda_handler
      Events:
        VerifyBiometric:
          Type: Api
          Properties:
            Path: /verify
            Method: post
            RestApiId: !Ref IdentityHubApi

Outputs:
  ApiEndpoint:
    Description: "API Gateway Base URL"
    Value: !Sub "https://${IdentityHubApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"